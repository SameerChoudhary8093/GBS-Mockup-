<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Application</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Landing page for Application" />

    <!-- Open Graph / WhatsApp / LinkedIn Preview -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://gbs-mockup.vercel.app/" />
    <meta property="og:title" content="Application" />
    <meta property="og:description" content="Landing page for Application" />
    <meta property="og:site_name" content="Application" />
    <!-- Placeholder for preview image -->
    <meta property="og:image" content="https://gbs-mockup.vercel.app/og-image.png" />

    <!-- Twitter Preview -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://gbs-mockup.vercel.app/" />
    <meta name="twitter:title" content="Application" />
    <meta name="twitter:description" content="Landing page for Application" />
    <meta name="twitter:image" content="https://gbs-mockup.vercel.app/og-image.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="./Favicon.png" />

    <style>
      @import url("https://fonts.googleapis.com/css?family=Lato:900,800,400,700|Lexend:400,700");
      
      .form-highlight {
        animation: formPopup 3s ease-in-out;
        transform: scale(1.05);
        z-index: 1000;
        position: relative;
      }
      
      @keyframes formPopup {
        0% {
          transform: scale(1);
          box-shadow: 0 0 0 rgba(193, 150, 63, 0.8);
        }
        15% {
          transform: scale(1.08);
          box-shadow: 0 0 50px rgba(193, 150, 63, 0.8), 0 0 100px rgba(193, 150, 63, 0.4);
        }
        30% {
          transform: scale(1.05);
          box-shadow: 0 0 40px rgba(193, 150, 63, 0.6), 0 0 80px rgba(193, 150, 63, 0.3);
        }
        70% {
          transform: scale(1.05);
          box-shadow: 0 0 30px rgba(193, 150, 63, 0.4), 0 0 60px rgba(193, 150, 63, 0.2);
        }
        100% {
          transform: scale(1);
          box-shadow: 0 10px 10px -5px rgba(0, 0, 0, 0.06), 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }
      }
      
      .form-highlight::before {
        content: '';
        position: absolute;
        top: -5px;
        left: -5px;
        right: -5px;
        bottom: -5px;
        background: linear-gradient(45deg, #c1963f, #f4e4c1, #c1963f);
        border-radius: 16px;
        z-index: -1;
        animation: borderGlow 3s ease-in-out;
      }
      
      @keyframes borderGlow {
        0%, 100% {
          opacity: 0;
        }
        15%, 70% {
          opacity: 1;
        }
      }
    </style>
    <link href="tailwind.css" rel="stylesheet" />
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="./src/index.tsx"></script>
  </body>
</html>
